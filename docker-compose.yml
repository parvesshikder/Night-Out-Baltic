services:
  backend:
    build:
      context: ./backend
    container_name: night-out-baltic-api
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8081
    container_name: night-out-baltic-web
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:8081
